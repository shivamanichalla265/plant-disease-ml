<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 80px;
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            display: inline-block;
        }

        h1 {
            color: #2e7d32;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1b5e20;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f8e9;
            border-radius: 10px;
        }

        .confidence {
            color: #444;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌿 Plant Disease Detector</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h2>Prediction: {{ prediction }}</h2>
        <p class="confidence">Confidence: {{ confidence }}%</p>
        <p>{{ info }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
